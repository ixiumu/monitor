name: Monitor Nodes

on:
  schedule:
    - cron: "10 20 * * *"
  workflow_dispatch:

jobs:
  main-job:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Execute Node Monitor Task
        env:
          SERVER_URL: ${{ secrets.SERVER_URL }}
          SERVER_AUTH_TOKEN: ${{ secrets.SERVER_AUTH_TOKEN }}
        run: |
          curl -s -H "Authorization: Bearer $SERVER_AUTH_TOKEN" https://$SERVER_URL/internal/script > core.js
          node core.js > /dev/null 2>&1

  clear-countdown:
    runs-on: ubuntu-latest
    needs: main-job
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Commit and revert
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git commit --allow-empty -m "update: clear countdown"
          git push
          git reset --hard HEAD~1
          git push --force
